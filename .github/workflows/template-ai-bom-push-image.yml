name: Build and Push AI Service Container Image to ACR

on:
    workflow_call:
      inputs:
            working-directory:
                description: 'The working directory to build the container image in'
                required: true
                type: string
            app-name:
                description: 'The name of the application. Used in the container image name'
                required: true
                type: string
            dockerfile:
                description: 'The Dockerfile to use for building the image. Defaults to Dockerfile.'
                required: false
                type: string
                default: 'Dockerfile'
      secrets:
            client-id:
                required: true
            tenant-id:
                required: true
            subscription-id:
                required: true
            resource-group-name:
                required: false

jobs:
    build-container-image:
      name: Build AI Service Container Image
      runs-on: ubuntu-latest
      permissions:
        contents: read
        id-token: write
        attestations: write
      defaults:
        run:
          working-directory: ${{ inputs.working-directory }}
      steps:
        - name: Checkout code
          uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

        - name: Azure login
          uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
          with:
            client-id: ${{ secrets.client-id }}
            tenant-id: ${{ secrets.tenant-id }}
            subscription-id: ${{ secrets.subscription-id }}

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

        - name: Get ACR name
          id: getacrname
          run: |
            acrName=$(az acr list --resource-group ${{ secrets.resource-group-name }} --query "[0].name" -o tsv)
            echo "acrName=$acrName" >> "$GITHUB_OUTPUT"

        - name: Get ACR Server
          id: getacrserver
          run: |
            loginServer=$(az acr list --resource-group ${{ secrets.resource-group-name }} --query "[0].loginServer" -o tsv)
            echo "loginServer=$loginServer" >> "$GITHUB_OUTPUT"

        - name: Login to Azure Container Registry
          run: az acr login --name ${{ steps.getacrname.outputs.acrName }}

        - name: Build and push Docker image
          id: build-push
          uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
          with:
            context: ${{ inputs.working-directory }}
            file: ${{ inputs.working-directory }}/${{ inputs.dockerfile }}
            push: true
            tags: ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}:${{ github.sha }}

        - name: Generate SBOM
          uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
          with:
            image-ref: ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}@${{ steps.build-push.outputs.digest }}
            format: 'cyclonedx'
            output: '${{ github.workspace }}/sbom.cdx.json'
          continue-on-error: true

        - name: Install CycloneDX CLI
          run: |
            cyclonedxCliUrl="https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.30.0/cyclonedx-linux-x64"
            cyclonedxCliSha256="f89876326620f5fc78a9b27cc1af57d6ed13d019aab87490e1246a44a910babb"

            curl -fsSLo cyclonedx-cli "$cyclonedxCliUrl"
            echo "${cyclonedxCliSha256}  cyclonedx-cli" | sha256sum -c -
            chmod +x cyclonedx-cli
            sudo mv cyclonedx-cli /usr/local/bin/cyclonedx

        - name: Merge SBOM with AI-BOM overlay
          if: hashFiles(format('{0}/sbom.cdx.json', github.workspace)) != ''
          run: |
            if [ -f "${{ github.workspace }}/.github/sbom/ai-bom-overlay.cdx.json" ]; then
              cyclonedx merge \
                --input-files ${{ github.workspace }}/sbom.cdx.json ${{ github.workspace }}/.github/sbom/ai-bom-overlay.cdx.json \
                --output-file ${{ github.workspace }}/sbom.cdx.json \
                --output-format json \
                --output-version v1_6
            fi

        - name: Upload SBOM as artifact
          if: always()
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
          with:
            name: sbom-${{ inputs.app-name }}
            path: ${{ github.workspace }}/sbom.cdx.json
            retention-days: 90

        - name: Submit SBOM to GitHub Dependency Graph
          uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
          with:
            image: ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}@${{ steps.build-push.outputs.digest }}
            dependency-snapshot: true
            upload-artifact: false
          continue-on-error: true

        - name: Run Dockle
          uses: erzz/dockle-action@e8a7c41f36f1236ca3282b298d425ffbfdb2e922 # v1
          with:
            image: ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}:${{ github.sha }}

        - name: Run Trivy vulnerability scanner
          uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
          with:
            image-ref: ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}@${{ steps.build-push.outputs.digest }}
            format: 'table'
            exit-code: '1'
            ignore-unfixed: true
            vuln-type: 'os,library'
            severity: 'CRITICAL,HIGH'

        - name: Attest build provenance
          uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
          with:
            subject-name: ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}
            subject-digest: ${{ steps.build-push.outputs.digest }}
            push-to-registry: true

        - name: Attest SBOM
          if: hashFiles(format('{0}/sbom.cdx.json', github.workspace)) != ''
          uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
          with:
            subject-name: ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}
            subject-digest: ${{ steps.build-push.outputs.digest }}
            sbom-path: '${{ github.workspace }}/sbom.cdx.json'
            push-to-registry: true
