name: Build and Push Container Image to ACR

on:
    workflow_call:
      inputs:
            working-directory:
                description: 'The working directory to build the container image in'
                required: true
                type: string
            app-name:
                description: 'The name of the application. Used in the container image name'
                required: true
                type: string
            dockerfile:
                description: 'The Dockerfile to use for building the image. Defaults to Dockerfile.'
                required: false
                type: string
                default: 'Dockerfile'
      secrets:
            client-id:
                required: true
            tenant-id:
                required: true
            subscription-id:
                required: true
            resource-group-name:
                required: false
    
jobs:
    build-container-image:
      name: Build Container Image
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: ${{ inputs.working-directory }}
      steps:
        - name: Checkout code
          uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
  
        - name: Azure login
          uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
          with:
            client-id: ${{ secrets.client-id }}
            tenant-id: ${{ secrets.tenant-id }}
            subscription-id: ${{ secrets.subscription-id }}
  
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
  
        - name: Get ACR name
          id: getacrname
          run: |
            acrName=$(az acr list --resource-group ${{ secrets.resource-group-name }} --query "[0].name" -o tsv)
            echo "acrName=$acrName" >> "$GITHUB_OUTPUT"
  
        - name: Get ACR Server
          id: getacrserver
          run: |
            loginServer=$(az acr list --resource-group ${{ secrets.resource-group-name }} --query "[0].loginServer" -o tsv)
            echo "loginServer=$loginServer" >> "$GITHUB_OUTPUT"
  
        - name: Login to Azure Container Registry
          run: az acr login --name ${{ steps.getacrname.outputs.acrName }}
  
        - name: Build Docker image
          run: |
            docker build -f ${{ inputs.dockerfile }} -t ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}:${{ github.sha }} .

        - name: Generate SBOM
          uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
          with:
            image-ref: ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}:${{ github.sha }}
            format: 'cyclonedx'
            output: 'sbom.cdx.json'
          continue-on-error: true

        - name: Upload SBOM as artifact
          if: always()
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
          with:
            name: sbom-${{ inputs.app-name }}
            path: sbom.cdx.json
            retention-days: 90

        - name: Submit SBOM to GitHub Dependency Graph
          uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
          with:
            image: ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}:${{ github.sha }}
            dependency-snapshot: true
            upload-artifact: false
          continue-on-error: true

        - name: Run Dockle
          uses: erzz/dockle-action@e8a7c41f36f1236ca3282b298d425ffbfdb2e922 # v1
          with:
            image: ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}:${{ github.sha }}

        - name: Run Trivy vulnerability scanner
          uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
          with:
            image-ref: ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}:${{ github.sha }}
            format: 'table'
            exit-code: '1'
            ignore-unfixed: true
            vuln-type: 'os,library'
            severity: 'CRITICAL,HIGH'
          
        - name: Push Docker image
          run: |
            docker push ${{ steps.getacrserver.outputs.loginServer }}/${{ inputs.app-name }}:${{ github.sha }}
            