name: Deploy Bicep Template

on:
    workflow_call:
        inputs:
            template-file:
                required: true
                type: string
            parameters-file:
                required: true
                type: string
            parameters:
                required: false
                type: string
            scope:
                required: true
                type: string
            inject-tenant-id:
                required: false
                type: boolean
                default: false
            inject-easy-auth-config:
              required: false
              type: boolean
              default: false
            inject-alert-email:
              required: false
              type: boolean
              default: false
            environment:
                required: true
                type: string
        secrets:
            client-id:
                required: true
            tenant-id:
                required: true
            subscription-id:
                required: true
            resource-group-name:
                required: false
            easy-auth-client-id:
              required: false
            alert-email-address:
              required: false

jobs:
    deploy:
        name: Deploy Bicep Template
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}
        steps:
        - uses: actions/checkout@v5
          name: Checkout Repository Code

        - uses: azure/login@v2
          name: Login to Azure
          with:
            client-id: ${{ secrets.client-id }}
            tenant-id: ${{ secrets.tenant-id }}
            subscription-id: ${{ secrets.subscription-id }}

        - name: Prepare Parameters
          id: prepare-params
          shell: bash
          env:
            INPUT_PARAMS: ${{ inputs.parameters }}
            INJECT_TENANT_ID: ${{ inputs.inject-tenant-id }}
            TENANT_ID: ${{ secrets.tenant-id }}
            INJECT_EASY_AUTH: ${{ inputs.inject-easy-auth-config }}
            EASY_AUTH_CLIENT_ID: ${{ secrets.easy-auth-client-id }}
            INJECT_ALERT_EMAIL: ${{ inputs.inject-alert-email }}
            ALERT_EMAIL_ADDRESS: ${{ secrets.alert-email-address }}
          run: |
            PARAMS="$INPUT_PARAMS"

            if [ -z "$PARAMS" ]; then
              PARAMS='{}'
            fi

            if [ "$INJECT_TENANT_ID" = "true" ]; then
              PARAMS=$(echo "$PARAMS" | jq -c --arg tenantId "$TENANT_ID" '. + {"tenantId": $tenantId}')
            fi

            if [ "$INJECT_EASY_AUTH" = "true" ]; then
              PARAMS=$(echo "$PARAMS" | jq -c --arg easyAuthTenantId "$TENANT_ID" '. + {"easyAuthTenantId": $easyAuthTenantId}')

              if [ -n "$EASY_AUTH_CLIENT_ID" ]; then
                PARAMS=$(echo "$PARAMS" | jq -c --arg easyAuthClientId "$EASY_AUTH_CLIENT_ID" '. + {"easyAuthClientId": $easyAuthClientId}')
              fi
            fi

            if [ "$INJECT_ALERT_EMAIL" = "true" ]; then
              PARAMS=$(echo "$PARAMS" | jq -c --arg alertEmailAddress "$ALERT_EMAIL_ADDRESS" '. + {"alertEmailAddress": $alertEmailAddress}')
            fi

            echo "params=$PARAMS" >> "$GITHUB_OUTPUT"

        - uses: azure/bicep-deploy@v2
          name: Deploy Bicep Template
          with:
            type: deployment
            operation: create
            scope: ${{ inputs.scope }}
            subscription-id: ${{ secrets.subscription-id }}
            resource-group-name: ${{ secrets.resource-group-name }}
            template-file: ${{ inputs.template-file }}
            parameters-file: ${{ inputs.parameters-file }}
            parameters: ${{ steps.prepare-params.outputs.params }}
            name: ${{ github.run_number }} 