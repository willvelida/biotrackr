name: AI-BOM Safety Check

on:
    pull_request:
        branches:
            - main
        paths:
            - '**/*.md'
            - '!.copilot-tracking/**'

permissions:
    contents: read

jobs:
    safety-check:
        name: Scan for Tier 3 Detail Leakage
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - name: Run AI-BOM safety check
              shell: pwsh
              run: ./scripts/check-ai-bom-safety.ps1
