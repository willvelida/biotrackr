name: Validate Bicep Template

on:
    workflow_call:
        inputs:
            template-file:
                required: true
                type: string
            parameters-file:
                required: true
                type: string
            parameters:
                required: false
                type: string
            scope:
                required: true
                type: string
            inject-tenant-id:
                required: false
                type: boolean
                default: false
            inject-easy-auth-config:
              required: false
              type: boolean
              default: false
        secrets:
            client-id:
                required: true
            tenant-id:
                required: true
            subscription-id:
                required: true
            resource-group-name:
                required: false
            easy-auth-client-id:
              required: false

jobs:
    validate:
        name: Validate Bicep Template
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              name: Checkout Repository Code

            - uses: azure/login@v2
              name: Login to Azure
              with:
                client-id: ${{ secrets.client-id }}
                tenant-id: ${{ secrets.tenant-id }}
                subscription-id: ${{ secrets.subscription-id }}

            - name: Prepare Parameters
              id: prepare-params
              shell: bash
              run: |
                PARAMS='${{ inputs.parameters }}'

                if [ -z "$PARAMS" ]; then
                  PARAMS='{}'
                fi

                if [ "${{ inputs.inject-tenant-id }}" = "true" ]; then
                  PARAMS=$(echo "$PARAMS" | jq -c --arg tenantId "${{ secrets.tenant-id }}" '. + {"tenantId": $tenantId}')
                fi

                if [ "${{ inputs.inject-easy-auth-config }}" = "true" ]; then
                  PARAMS=$(echo "$PARAMS" | jq -c --arg easyAuthTenantId "${{ secrets.tenant-id }}" '. + {"easyAuthTenantId": $easyAuthTenantId}')

                  if [ -n "${{ secrets.easy-auth-client-id }}" ]; then
                    PARAMS=$(echo "$PARAMS" | jq -c --arg easyAuthClientId "${{ secrets.easy-auth-client-id }}" '. + {"easyAuthClientId": $easyAuthClientId}')
                  fi
                fi

                echo "params=$PARAMS" >> "$GITHUB_OUTPUT"

            - uses: azure/bicep-deploy@v2
              name: Run preflight validation
              with:
                type: deployment
                scope: ${{ inputs.scope }}
                subscription-id: ${{ secrets.subscription-id }}
                resource-group-name: ${{ secrets.resource-group-name }}
                name: ${{ github.run_number }}
                template-file: ${{ inputs.template-file }}
                parameters-file: ${{ inputs.parameters-file }}
                parameters: ${{ steps.prepare-params.outputs.params }}
                operation: validate